<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>ĐUA NGỰA ĐỊNH MỆNH</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Courier New', monospace; text-align: center; }
        .stats-box { background: #222; border: 1px solid #555; padding: 10px; margin: 10px auto; width: 300px; font-size: 12px; }
        #track { border: 2px solid #555; width: 350px; height: 300px; margin: 10px auto; position: relative; background: #111; display: flex; justify-content: space-around; }
        .lane { width: 20%; border-right: 1px dashed #333; position: relative; }
        .horse { position: absolute; bottom: 0; width: 100%; text-align: center; font-size: 20px; transition: bottom 0.1s linear; }
        .controls { margin-top: 10px; }
        .btn { background: #333; color: #fff; border: 1px solid #777; padding: 8px; cursor: pointer; }
        .active { border-color: #55ff55; color: #55ff55; }
    </style>
</head>
<body>
    <h3>[ ĐUA NGỰA ]</h3>
    <div class="stats-box">
        <strong>Tỷ lệ thắng (?):</strong><br>
        Ngựa 1: 3% (x4) | Ngựa 2: 67% (x1.15)<br>
        Ngựa 3: 20% (x1.5) | Ngựa 4: 10% (x1.5)
    </div>

    <div id="track">
        <div class="lane"><div id="h0" class="horse">🐎1</div></div>
        <div class="lane"><div id="h1" class="horse">🐎2</div></div>
        <div class="lane"><div id="h2" class="horse">🐎3</div></div>
        <div class="lane"><div id="h3" class="horse">🐎4</div></div>
    </div>

    <div class="controls">
        Chọn ngựa: 
        <button class="btn" onclick="selectHorse(0)">1</button>
        <button class="btn" onclick="selectHorse(1)">2</button>
        <button class="btn" onclick="selectHorse(2)">3</button>
        <button class="btn" onclick="selectHorse(3)">4</button>
        <br><br>
        Cược: <input type="number" id="bet" value="100" style="width:60px"> G
        <br><br>
        <button class="btn" onclick="startRace()" id="startBtn">[ BẮT ĐẦU ĐUA ]</button>
    </div>
    <p id="msg">Chọn ngựa đi ní!</p>
    <a href="index.html">[ VỀ SẢNH ]</a>

    <script>
        let selected = -1;
        const odds = [4, 1.15, 1.5, 1.5];
        const winProb = [0.03, 0.67, 0.20, 0.10];

        function selectHorse(n) {
            selected = n;
            document.querySelectorAll('.btn').forEach((b,i) => b.className = (i==n ? 'btn active' : 'btn'));
        }

        async function startRace() {
            if(selected === -1) { alert("Chưa chọn ngựa!"); return; }
            let bet = parseInt(document.getElementById('bet').value);
            let bal = parseInt(localStorage.getItem('casino_balance'));
            if(bet > bal) { alert("Không đủ tiền!"); return; }
            
            localStorage.setItem('casino_balance', bal - bet);
            document.getElementById('startBtn').disabled = true;

            // Xác định người thắng dựa trên tỉ lệ
            let rand = Math.random();
            let winner = 0;
            let cumulative = 0;
            for(let i=0; i<4; i++) {
                cumulative += winProb[i];
                if(rand <= cumulative) { winner = i; break; }
            }

            // Chạy đua
            let horses = [0,0,0,0];
            let interval = setInterval(() => {
                for(let i=0; i<4; i++) {
                    let speed = (i === winner) ? 1.2 : Math.random() * 1.5;
                    horses[i] += speed;
                    document.getElementById('h'+i).style.bottom = horses[i] + 'px';
                }
                if(Math.max(...horses) >= 270) {
                    clearInterval(interval);
                    finish(winner, bet);
                }
            }, 100);
        }

        function finish(winner, bet) {
            if(winner === selected) {
                let prize = Math.floor(bet * odds[winner]);
                localStorage.setItem('casino_balance', parseInt(localStorage.getItem('casino_balance')) + prize);
                document.getElementById('msg').innerHTML = `<span style="color:#5f5">Thắng rồi! Nhận ${prize} G</span>`;
            } else {
                document.getElementById('msg').innerHTML = `<span style="color:#f55">Thua rồi, ngựa ${winner+1} về nhất!</span>`;
            }
            document.getElementById('startBtn').disabled = false;
        }
    </script>
</body>
</html>
